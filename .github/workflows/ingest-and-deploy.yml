name: Ingest and deploy
on:
  repository_dispatch:
    types: [leetcode-updated]
  workflow_dispatch:
    inputs:
      full:
        description: Full rebuild
        type: boolean
        default: false
      skip_llm:
        description: Skip LLM
        type: boolean
        default: false
      source_sha:
        description: Optional source SHA
        type: string
permissions:
  contents: write
concurrency:
  group: leetcode-site-production
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out frontend
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Resolve source ref
        id: ref
        env:
          DISPATCH_SHA: ${{ github.event.client_payload.source_sha }}
          MANUAL_SHA: ${{ inputs.source_sha }}
        run: echo "value=${DISPATCH_SHA:-${MANUAL_SHA:-main}}" >> "$GITHUB_OUTPUT"
      - name: Check out source solutions
        uses: actions/checkout@v4
        with:
          repository: Kainoa-h/BOMBBOMBOBMOBOMBOMBOMBOMBBOMB
          path: source-solutions
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.value }}
      - uses: pnpm/action-setup@v4
        with: { version: 10.12.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Ingest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_SITE_URL: ${{ vars.OPENROUTER_SITE_URL }}
          OPENROUTER_APP_NAME: LeetCode Solution History
          FULL: ${{ inputs.full }}
          SKIP_LLM: ${{ inputs.skip_llm }}
        run: pnpm ingest --source ./source-solutions ${{ env.FULL == 'true' && '--full' || '' }} ${{ env.SKIP_LLM == 'true' && '--no-llm' || '' }}
      - run: pnpm test
      - run: pnpm build
      - name: Commit generated data
        env:
          SOURCE_SHA: ${{ steps.ref.outputs.value }}
        run: |
          git config user.name "leetcode-history-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated
          git diff --cached --quiet || git commit -m "data: ingest source ${SOURCE_SHA}"
          git push
      - name: Deploy Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: pnpm wrangler deploy dist --project-name="${CLOUDFLARE_PAGES_PROJECT:-leetcode-solution-history}"
